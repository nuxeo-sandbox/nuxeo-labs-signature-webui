<!-- Import the components -->
<link rel="import" href="nuxeo-labs-signature-tab.html">
<link rel="import" href="nuxeo-labs-signature-certificate.html">

<!--
  Register the Signature tab on documents.
  Shows up for documents that have a blob (non-Folderish).
-->
<nuxeo-slot-content name="signatureTabItem" slot="DOCUMENT_VIEWS_ITEMS" order="50">
  <template>
    <nuxeo-filter document="[[document]]" expression="document.facets.indexOf('Folderish') === -1">
      <template>
        <nuxeo-page-item name="signature" label="signature.tab.label"></nuxeo-page-item>
      </template>
    </nuxeo-filter>
  </template>
</nuxeo-slot-content>

<nuxeo-slot-content name="signatureTabPage" slot="DOCUMENT_VIEWS_PAGES" order="50">
  <template>
    <nuxeo-filter document="[[document]]" expression="document.facets.indexOf('Folderish') === -1">
      <template>
        <nuxeo-labs-signature-tab name="signature" document="[[document]]"></nuxeo-labs-signature-tab>
      </template>
    </nuxeo-filter>
  </template>
</nuxeo-slot-content>

<!--
  Register the Certificate page in the user menu.
-->
<nuxeo-slot-content name="signatureCertificateItem" slot="USER_MENU" order="50">
  <template>
    <nuxeo-menu-item name="certificates" label="signature.cert.menuLabel" route="page:certificates" icon="social:person"></nuxeo-menu-item>
  </template>
</nuxeo-slot-content>

<nuxeo-slot-content name="signatureCertificatePage" slot="PAGES" order="50">
  <template>
    <nuxeo-labs-signature-certificate name="certificates"></nuxeo-labs-signature-certificate>
  </template>
</nuxeo-slot-content>
